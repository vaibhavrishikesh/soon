name: Soon
options:
  bundleIdPrefix: com.tranquilwaters
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "5978FBWL5U"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
targets:
  Soon:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - target: SoonWidget
        embed: true
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tranquilwaters.soon
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Soon/Info.plist
      properties:
        CFBundleDisplayName: Soon
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        GADApplicationIdentifier: ca-app-pub-4765907187067298~5073486989
        NSUserTrackingUsageDescription: Used to show you more relevant ads.
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
    entitlements:
      path: Soon.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tranquilwaters.soon

  SoonWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SoonWidget
      - path: Sources/Models/CountdownEvent.swift
      - path: Sources/Models/SoonActivityAttributes.swift
      - path: Sources/Models/LiveActivityControl.swift
      - path: Sources/Theme.swift
      - path: Sources/Store/SharedData.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tranquilwaters.soon.widget
        INFOPLIST_FILE: SoonWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: "YES"
    entitlements:
      path: SoonWidget/SoonWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tranquilwaters.soon
